<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criar conta · Nosso Calendário</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-shell">
    <aside class="auth-hero" id="auth-hero">
      <div class="auth-hero-content">
        <div class="auth-hero-logo">
          <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#icon-heart"></use></svg>
        </div>
        <h1>Nosso Calendário</h1>
        <p>Crie sua conta e comece a organizar a vida a dois.</p>
      </div>
    </aside>

    <div class="auth-form-side">
      <div class="card auth-card fade-in">
        <h2>Criar conta</h2>
        <p>Cadastre-se para acessar o calendário do casal</p>

        <form id="register-form">
          <div class="field">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required minlength="4" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-submit">Cadastrar</button>
        </form>

        <p class="auth-footer">Já tem conta? <a href="login.html">Entrar</a></p>
      </div>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/register.js"></script>
</body>
</html>
