<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login · Nosso Calendário</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-shell">
    <aside class="auth-hero" id="auth-hero">
      <div class="auth-hero-content">
        <div class="auth-hero-logo">
          <svg class="icon" aria-hidden="true"><use href="../assets/icons.svg#icon-heart"></use></svg>
        </div>
        <h1>Nosso Calendário</h1>
      </div>
    </aside>

    <div class="auth-form-side">
      <div class="card auth-card fade-in">
        <h2>Bem-vindo de volta</h2>
        <p>Entre para ver o calendário de nós dois</p>

        <form id="login-form">
          <div class="field">
            <label for="name">Nome</label>
            <input type="text" id="name" name="name" required autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-submit">Entrar</button>
        </form>

        <p class="auth-hint">Usuário: <strong>primeiro nome nosso</strong> · Senha: <strong>data de namoro</strong></p>

        <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
      </div>
    </div>
  </div>
</div>

<script type="module" src="../js/pages/login.js"></script>
</body>
</html>
